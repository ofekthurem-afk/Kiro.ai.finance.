<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Kiro – מומחה פיננסי AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══ VARIABLES ══ */
:root{
  --bg:#090d12;
  --bg-mid:#0e1219;
  --bg-sur:#141a24;
  --bg-rai:#1a2230;
  --gold:#c9a84c;
  --gold-l:#e2c47a;
  --gold-d:#7a6030;
  --gold-glow:rgba(201,168,76,.18);
  --text:#ede9e3;
  --text-s:#9a9790;
  --text-m:#55514e;
  --teal:#2ab5a0;
  --red:#e05555;
  --bdr:rgba(201,168,76,.14);
  --bdr-s:rgba(255,255,255,.055);
  --sbw:285px;
  --tr:.2s cubic-bezier(.4,0,.2,1);
  --rsm:7px;
  --rmd:13px;
}
body.light{
  --bg:#f2ede5;
  --bg-mid:#e8e2d8;
  --bg-sur:#ddd7cc;
  --bg-rai:#d0c9bc;
  --gold:#8a6520;
  --gold-l:#5c4210;
  --gold-d:#b08030;
  --gold-glow:rgba(138,101,32,.12);
  --text:#1a1714;
  --text-s:#4a4540;
  --text-m:#8a8278;
  --bdr:rgba(138,101,32,.2);
  --bdr-s:rgba(0,0,0,.08);
}

/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer}
textarea{font-family:inherit}

/* ══ LAYOUT ══ */
#app{display:flex;height:100vh;overflow:hidden}

/* ══ SIDEBAR ══ */
#sb{
  width:var(--sbw);height:100vh;
  background:var(--bg-mid);
  border-inline-end:1px solid var(--bdr);
  display:flex;flex-direction:column;
  flex-shrink:0;overflow:hidden;z-index:10;
  transition:width var(--tr),transform var(--tr),border-color var(--tr);
}
#sb.off{width:0;border-inline-end:none}
.sb-top{
  padding:15px 17px 11px;
  border-bottom:1px solid var(--bdr-s);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.sb-brand{display:flex;align-items:center;gap:9px}
.sb-ico{
  width:29px;height:29px;
  background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border-radius:var(--rsm);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#090d12;
}
.sb-name{
  font-family:'Cormorant Garamond',serif;font-size:18px;
  font-weight:600;color:var(--gold-l);letter-spacing:1px;
}
.sb-close{
  background:none;border:none;color:var(--text-m);padding:6px;
  border-radius:var(--rsm);display:flex;transition:all var(--tr);
}
.sb-close:hover{color:var(--text);background:var(--bg-rai)}

/* Tabs */
.sb-tabs{display:flex;border-bottom:1px solid var(--bdr-s);flex-shrink:0}
.sbt{
  flex:1;background:none;border:none;color:var(--text-m);
  font-size:11px;font-weight:500;padding:9px 2px;
  border-bottom:2px solid transparent;transition:all var(--tr);text-align:center;
}
.sbt.on{color:var(--gold-l);border-bottom-color:var(--gold)}
.sbt:hover:not(.on){color:var(--text-s)}

/* Panels */
.sb-body{flex:1;overflow-y:auto;padding:17px 19px;scrollbar-width:thin;scrollbar-color:var(--bg-rai) transparent}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--bg-rai);border-radius:2px}
.pnl{display:none}.pnl.on{display:block}
.sg{margin-bottom:20px}
.sg-lbl{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-m);margin-bottom:8px}
.sg-txt{font-size:12px;color:var(--text-m);line-height:1.75}

/* Theme toggle */
.th-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-sur);border-radius:var(--rsm);padding:10px 13px;
  cursor:pointer;transition:background var(--tr);
}
.th-row:hover{background:var(--bg-rai)}
.th-label{font-size:13px;color:var(--text-s)}
.tsw{
  width:35px;height:19px;background:var(--bg-rai);border-radius:10px;
  position:relative;transition:background var(--tr);
  border:1px solid var(--bdr-s);pointer-events:none;flex-shrink:0;
}
.tsw.on{background:var(--gold-d)}
.tsw::after{
  content:'';position:absolute;width:13px;height:13px;
  background:var(--text-m);border-radius:50%;top:2px;right:2px;
  transition:all var(--tr);
}
.tsw.on::after{background:var(--gold-l);right:calc(100% - 15px)}

/* API key field */
.api-wrap{display:flex;flex-direction:column;gap:7px}
.api-input{
  width:100%;background:var(--bg-sur);border:1px solid var(--bdr-s);
  color:var(--text);font-family:'DM Mono',monospace;font-size:11.5px;
  padding:9px 11px;border-radius:var(--rsm);outline:none;
  transition:border-color var(--tr);direction:ltr;
}
.api-input:focus{border-color:rgba(201,168,76,.4)}
.api-input::placeholder{color:var(--text-m);font-family:'DM Sans',sans-serif;font-size:12px}
.api-btn{
  width:100%;background:linear-gradient(135deg,var(--gold-d),rgba(201,168,76,.1));
  border:1px solid var(--bdr);color:var(--gold-l);
  font-size:12px;font-weight:600;padding:9px;border-radius:var(--rsm);
  transition:all var(--tr);
}
.api-btn:hover{box-shadow:0 4px 16px var(--gold-glow)}
.api-ok{font-size:11px;color:var(--teal);text-align:center;display:none}
.api-note{font-size:11px;color:var(--text-m);line-height:1.9;margin-top:4px}
.api-note strong{color:var(--gold-l)}
.key-status{
  background:var(--bg-sur);border:1px solid var(--bdr-s);
  border-radius:var(--rsm);padding:10px 13px;
  font-size:12px;color:var(--text-m);line-height:1.75;
}
.key-active{border-color:rgba(42,181,160,.35)!important;color:var(--teal)!important;font-weight:500}
.key-none{color:var(--text-m)}

/* About tags */
.about-h{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;color:var(--gold-l);margin-bottom:8px;
}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tag{
  background:var(--bg-rai);border:1px solid var(--bdr-s);
  color:var(--text-s);font-size:11px;padding:3px 9px;border-radius:14px;
}

/* Legal boxes */
.dbox{
  background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.14);
  border-radius:var(--rmd);padding:12px;margin-bottom:11px;
}
.dbox-t{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.dbox-b{font-size:12px;color:var(--text-m);line-height:1.75}

/* ══ MAIN ══ */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

/* Topbar */
#topbar{
  height:51px;flex-shrink:0;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;
  padding:0 13px;gap:8px;
  border-bottom:1px solid var(--bdr-s);
  background:rgba(9,13,18,.92);backdrop-filter:blur(20px);
  z-index:5;
}
body.light #topbar{background:rgba(242,237,229,.92)}
.tb-l,.tb-r{display:flex;align-items:center}
.tb-r{justify-content:flex-end}
.tb-c{display:flex;align-items:center;justify-content:center;gap:8px}
.tb-k{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:#090d12;
  flex-shrink:0;
}
.tb-name{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;color:var(--gold-l);letter-spacing:1px;
}
.sdot{
  width:6px;height:6px;background:var(--teal);border-radius:50%;
  box-shadow:0 0 6px rgba(42,181,160,.6);
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.icon-btn{
  background:none;border:none;color:var(--text-s);
  padding:8px;border-radius:var(--rsm);display:flex;transition:all var(--tr);
}
.icon-btn:hover{color:var(--gold-l);background:var(--bg-sur)}
.new-btn{
  background:none;border:1.5px solid var(--gold-d);color:var(--gold-l);
  font-size:12px;font-weight:600;padding:5px 13px;border-radius:var(--rsm);
  transition:all var(--tr);white-space:nowrap;letter-spacing:0.3px;
  opacity:0.85;
}
.new-btn:hover{opacity:1;background:rgba(185,149,81,0.08);border-color:var(--gold)}

/* Lang bar — dir:ltr LOCKED, order never flips */
#langbar{
  flex-shrink:0;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;
  background:var(--bg-mid);border-bottom:1px solid var(--bdr-s);
  direction:ltr !important;
}
.lb{
  background:none;border:none;border-left:1px solid var(--bdr-s);
  color:var(--text-m);font-size:12px;font-weight:500;
  padding:8px 4px;transition:all var(--tr);text-align:center;direction:ltr;
}
.lb:first-child{border-left:none}
.lb:hover{background:var(--bg-sur);color:var(--text)}
.lb.on{
  background:var(--bg-sur);color:var(--gold-l);
  font-weight:600;border-bottom:2px solid var(--gold);
}

/* ══ BODY ══ */
#body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* Scroll area */
#scroll{
  flex:1;min-height:0;overflow-y:auto;
  scroll-behavior:auto;
  scrollbar-width:thin;scrollbar-color:var(--bg-rai) transparent;
}
#scroll::-webkit-scrollbar{width:3px}
#scroll::-webkit-scrollbar-thumb{background:var(--bg-rai);border-radius:2px}

/* Welcome */
#welcome{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:42px 24px 30px;
  animation:fadeUp .45s ease both;
}
#welcome.gone{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.w-ico{
  width:62px;height:62px;
  background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:#090d12;
  margin-bottom:17px;box-shadow:0 8px 32px var(--gold-glow);
}
.w-ttl{
  font-family:'Cormorant Garamond',serif;
  font-size:29px;font-weight:600;color:var(--gold-l);
  margin-bottom:9px;letter-spacing:.4px;
}
.w-sub{font-size:14px;color:var(--text-s);max-width:420px;line-height:1.8}

/* Messages */
#msgs{
  max-width:740px;width:100%;margin:0 auto;
  padding:8px 18px 24px;
  display:flex;flex-direction:column;gap:5px;
}
.mw{display:flex;flex-direction:column;animation:fadeUp .2s ease both}
.mw.u{align-items:flex-end}
.mrow{display:flex;align-items:flex-start;gap:9px}
.mw.u .mrow{flex-direction:row-reverse}
.av{
  width:27px;height:27px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:2px;
}
.av.k{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#090d12;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700}
.av.u{background:var(--bg-rai);color:var(--text-s);border:1px solid var(--bdr-s)}
.bbl{
  max-width:83%;padding:11px 15px;border-radius:var(--rmd);
  font-size:14px;line-height:1.8;position:relative;
  word-wrap:break-word;overflow-wrap:break-word;word-break:break-word;
}
.bbl.k{
  background:var(--bg-sur);border:1px solid var(--bdr-s);color:var(--text);
  border-start-start-radius:3px;
}
.bbl.u{
  background:linear-gradient(135deg,rgba(201,168,76,.13),rgba(201,168,76,.04));
  border:1px solid rgba(201,168,76,.2);color:var(--text);
  border-start-end-radius:3px;
}
/* Markdown inside bubble */
.bbl strong{color:var(--gold-l);font-weight:600}
.bbl em{color:var(--text-s);font-style:italic}
.bbl code{
  font-family:'DM Mono',monospace;font-size:11.5px;
  background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--gold-l);
}
.bbl pre{
  background:var(--bg);border:1px solid var(--bdr-s);border-radius:var(--rsm);
  padding:10px 12px;overflow-x:auto;margin:7px 0;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text-s);
}
.bbl ul,.bbl ol{padding-inline-start:18px;margin:5px 0}
.bbl li{margin-bottom:3px}
.bbl h3{font-family:'Cormorant Garamond',serif;color:var(--gold-l);margin:11px 0 5px;font-size:18px;font-weight:600}
.bbl h4{color:var(--gold-l);margin:8px 0 3px;font-size:14px;font-weight:600}
.bbl table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12.5px}
.bbl th{background:var(--bg-rai);color:var(--gold-l);padding:6px 10px;text-align:start;font-weight:600;border-bottom:1px solid var(--bdr)}
.bbl td{padding:5px 10px;border-bottom:1px solid var(--bdr-s);color:var(--text-s)}
.bbl tr:last-child td{border-bottom:none}
.bq{border-inline-start:3px solid var(--gold-d);padding:4px 10px;color:var(--text-m);font-size:13px;margin:5px 0;background:rgba(201,168,76,.04);border-radius:2px}
.cp-btn{
  position:absolute;top:6px;inset-inline-end:7px;
  background:var(--bg-rai);border:1px solid var(--bdr-s);color:var(--text-m);
  font-size:10px;padding:2px 7px;border-radius:4px;
  opacity:0;transition:opacity var(--tr);
}
.bbl.k:hover .cp-btn{opacity:1}
.cp-btn:hover{color:var(--gold-l)}
.mt{font-size:10px;color:var(--text-m);padding:3px 4px}
.mw.u .mt{text-align:end}

/* Typing dots */
.tdots{display:flex;align-items:center;gap:4px;padding:3px 0}
.tdot{width:5px;height:5px;background:var(--gold-d);border-radius:50%;animation:td 1.3s ease-in-out infinite}
.tdot:nth-child(2){animation-delay:.22s}
.tdot:nth-child(3){animation-delay:.44s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}

/* ══ INPUT ══ */
#inp-area{
  flex-shrink:0;
  padding:13px 16px 20px;
  background:var(--bg);
  border-top:1px solid var(--bdr-s);
}
.inp-box{
  max-width:740px;width:100%;margin:0 auto;
  background:var(--bg-sur);
  border:1px solid rgba(255,255,255,.09);
  border-radius:17px;
  display:flex;flex-direction:column;
  padding:13px 15px 11px;
  transition:border-color var(--tr),box-shadow var(--tr);
  cursor:text;min-height:78px;
}
.inp-box:focus-within{
  border-color:rgba(201,168,76,.42);
  box-shadow:0 0 0 3px rgba(201,168,76,.07);
}
#inp{
  background:none;border:none;outline:none;
  color:var(--text);font-size:15px;line-height:1.7;
  resize:none;min-height:42px;max-height:190px;
  overflow-y:auto;scrollbar-width:none;
  direction:inherit;width:100%;
}
#inp::-webkit-scrollbar{display:none}
#inp::placeholder{color:var(--text-m)}
.inp-foot{
  display:flex;align-items:center;justify-content:flex-end;
  margin-top:7px;padding-top:7px;border-top:1px solid var(--bdr-s);
}
#send{
  width:37px;height:37px;
  background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border:none;border-radius:10px;color:#090d12;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--tr);opacity:.22;flex-shrink:0;
}
#send.on{opacity:1}
#send.on:hover{transform:scale(1.07);box-shadow:0 4px 16px var(--gold-glow)}
#send:disabled{cursor:not-allowed}
.inp-hint{
  text-align:center;font-size:10px;color:var(--text-m);
  margin-top:7px;max-width:740px;margin-left:auto;margin-right:auto;
}

/* Overlay (mobile) */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:9;backdrop-filter:blur(4px)}
#ov.on{display:block}

/* ══ MOBILE ══ */
@media(max-width:768px){
  #sb{position:fixed;inset-block:0;inset-inline-start:0;height:100vh;z-index:20;width:var(--sbw)!important}
  #sb.off{transform:translateX(110%)}
  [dir="ltr"] #sb.off{transform:translateX(-110%)}
  .bbl{max-width:90%}
  #inp-area{padding:10px 12px 17px}
  #welcome{padding:26px 16px 20px}
  .w-ttl{font-size:25px}
}
</style>
</head>
<body class="light">
<div id="app">

<!-- ══ SIDEBAR ══ -->
<aside id="sb" class="off">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-ico">K</div>
      <span class="sb-name">Kiro</span>
    </div>
    <button class="sb-close" onclick="toggleSB()" aria-label="סגור">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="sb-tabs">
    <button class="sbt on" id="sbt-s" onclick="showTab('s')"></button>
    <button class="sbt"    id="sbt-a" onclick="showTab('a')"></button>
    <button class="sbt"    id="sbt-l" onclick="showTab('l')"></button>
  </div>

  <div class="sb-body">

    <!-- Settings -->
    <div class="pnl on" id="pnl-s">
      <div class="sg">
        <div class="sg-lbl" id="L-theme"></div>
        <div class="th-row" onclick="toggleTheme()">
          <span class="th-label" id="L-lm"></span>
          <div class="tsw" id="tsw"></div>
        </div>
      </div>
      <div class="sg">
        <p class="sg-txt" id="L-ver"></p>
      </div>
    </div>

    <!-- About -->
    <div class="pnl" id="pnl-a">
      <div class="sg">
        <div class="about-h">Kiro</div>
        <p class="sg-txt" id="L-about"></p>
      </div>
      <div class="sg">
        <div class="sg-lbl" id="L-exp-lbl"></div>
        <div class="tags" id="L-tags"></div>
      </div>
    </div>

    <!-- Legal -->
    <div class="pnl" id="pnl-l">
      <div class="dbox">
        <div class="dbox-t" id="L-disc-t"></div>
        <div class="dbox-b" id="L-disc-b"></div>
      </div>
      <div class="dbox">
        <div class="dbox-t" id="L-priv-t"></div>
        <div class="dbox-b" id="L-priv-b"></div>
      </div>
    </div>

  </div>
</aside>

<!-- ══ MAIN ══ -->
<div id="main">

  <header id="topbar">
    <div class="tb-l">
      <button class="icon-btn" onclick="toggleSB()" aria-label="תפריט">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="tb-c">
      <div class="tb-k">K</div>
      <div class="tb-name">Kiro</div>
    </div>
    <div class="tb-r">
      <button class="new-btn" id="L-new" onclick="newChat()"></button>
    </div>
  </header>

  <!-- Lang bar: dir=ltr locked — Español | English | عربي | עברית -->
  <div id="langbar" dir="ltr">
    <button class="lb"    id="lb-es" onclick="setLang('es')">Español</button>
    <button class="lb on" id="lb-en" onclick="setLang('en')">English</button>
    <button class="lb"    id="lb-ar" onclick="setLang('ar')">عربي</button>
    <button class="lb"    id="lb-he" onclick="setLang('he')">עברית</button>
  </div>

  <div id="body">
    <div id="scroll">
      <div id="welcome">
        <div class="w-ico">K</div>
        <div class="w-ttl" id="L-wttl"></div>
        <p class="w-sub" id="L-wsub"></p>
      </div>
      <div id="msgs"></div>
    </div>

══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  // Load saved config
  try {
    const cfg = JSON.parse(localStorage.getItem('kiro6_cfg') || '{}');
    if (cfg.lang) lang = cfg.lang;  // restored saved language
    // Light mode: use saved preference, default is light
    if (cfg.light === false) {
      light = false;
      document.body.classList.remove('light');
      document.getElementById('tsw').classList.remove('on');
    }
  } catch(e) {}
  applyLang(); // ensure tab button matches lang on every load

  // Start collapsed — no animation on load
  const sbEl = document.getElementById('sb');
  sbEl.style.transition = 'none';
  sbEl.classList.add('off');
  sbOpen = false;
  requestAnimationFrame(() => { sbEl.style.transition = ''; });

  applyLang();
});

/* ══════════════════════════════════════
   LANGUAGE
══════════════════════════════════════ */
function applyLang() {
  if (!T[lang]) { lang = 'en'; }
  const t = T[lang];

  // Document direction
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;
  document.getElementById('main').dir = t.dir;
  document.getElementById('sb').dir = t.dir;

  // Lang bar buttons
  ['he','ar','en','es'].forEach(l => {
    const lb = document.getElementById('lb-'+l);
    if (lb) lb.classList.toggle('on', l === lang);
  });
  // For non-tab languages, remove all tab highlights
  if (!['he','ar','en','es'].includes(lang)) {
    ['he','ar','en','es'].forEach(l => {
      const lb = document.getElementById('lb-'+l);
      if (lb) lb.classList.remove('on');
    });
  }

  // Topbar
  document.getElementById('L-new').textContent = t.new;

  // Welcome
  document.getElementById('L-wttl').textContent = t.wTtl;
  document.getElementById('L-wsub').textContent = t.wSub;

  // Input
  document.getElementById('inp').placeholder = t.ph;
  document.getElementById('L-hint').textContent = t.hint;

  // Sidebar tabs
  document.getElementById('sbt-s').textContent = t.tabS;
  document.getElementById('sbt-a').textContent = t.tabA;
  document.getElementById('sbt-l').textContent = t.tabL;

  // Settings panel
  document.getElementById('L-theme').textContent = t.theme;
  document.getElementById('L-lm').textContent = t.lm;
  document.getElementById('L-ver').textContent = t.ver;

  // About panel
  document.getElementById('L-about').textContent = t.about;
  document.getElementById('L-exp-lbl').textContent = t.expLbl;
  document.getElementById('L-tags').innerHTML = t.tags.map(x => `<span class="tag">${x}</span>`).join('');

  // Legal panel
  document.getElementById('L-disc-t').textContent = t.discT;
  document.getElementById('L-disc-b').textContent = t.discB;
  document.getElementById('L-priv-t').textContent = t.privT;
  document.getElementById('L-priv-b').textContent = t.privB;
}

function setLang(l) {
  lang = l;
  saveCfg();
  applyLang();
}

/* ══════════════════════════════════════
   INPUT HANDLING
══════════════════════════════════════ */
function onInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 190) + 'px';
  const words = el.value.trim() === '' ? 0 : el.value.trim().split(/\s+/).length;
  const tooLong = words > 100;
  const has = el.value.trim().length > 0 && !typing && !tooLong;
  document.getElementById('send').disabled = !has;
  document.getElementById('send').classList.toggle('on', has);
  const warn = document.getElementById('word-warn');
  if (warn) {
    if (tooLong) {
      const langWarn = T[lang] && T[lang].wordWarn ? T[lang].wordWarn : 'ודא שהודעתך מכילה 100 מילים או פחות';
      warn.textContent = langWarn;
      warn.style.cssText = 'display:block;color:#c0392b;background:rgba(255,235,235,0.95);border:1.5px solid rgba(192,57,43,0.3);border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;text-align:center;margin-bottom:6px;';
    } else {
      warn.style.display = 'none';
    }
  }
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!document.getElementById('send').disabled) sendMsg();
  }
}

/* ══════════════════════════════════════
   SCROLL
══════════════════════════════════════ */
function showWordWarning() {
  const warn = document.getElementById('word-warn');
  if (warn) { warn.style.display = 'block'; }
}

function scrollToUserMsg() {
  // Find the last user bubble and scroll it to the top of the view
  const msgs = document.getElementById('msgs');
  if (!msgs) return;
  const userBubbles = msgs.querySelectorAll('.mw.u');
  if (!userBubbles.length) return;
  const last = userBubbles[userBubbles.length - 1];
  last.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function scrollToBottom() {
  const scroll = document.getElementById('scroll');
  if (scroll) {
    setTimeout(() => {
      scroll.scrollTo({ top: scroll.scrollHeight, behavior: 'smooth' });
    }, 50);
  }
}

function scrollToLast() {
  scrollToBottom();
}

async function sendMsg() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || typing) return;

  const wordCount = text.trim().split(/\s+/).filter(w => w.length > 0).length;

    showWordWarning();
    return;
  }

    if (msgCount === 0) document.getElementById('welcome').classList.add('gone');

    inp.value = ''; inp.style.height = 'auto';

function callGroq(userText) {

      /(?:respond|answer|reply|write|say|ענה|כתוב|תענה|تجاوب|اجب|responde|réponds|antworte|rispondi|responda)\s+(?:in|ב|باللغة|en|auf|in)\s+(\w+)/i,

    if (/באנגלית|לאנגלית/.test(txt)) return 'English';

    if (/בגרמנית|לגרמנית/.test(txt)) return 'German';

    if (/ברוסית|לרוסית/.test(txt)) return 'Russian';

  }
  messages.push({ role: 'user', content: userText });

  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://api.groq.com/openai/v1/chat/completions', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('Authorization', 'Bearer ' + GROQ_KEY);
    xhr.timeout = 30000;
    xhr.ontimeout = function() { reject(new Error(t.errGen + 'timeout')); };
    xhr.onerror = function() { reject(new Error(t.err0)); };
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      var data;
      if (xhr.status === 0 || xhr.responseText === '') return reject(new Error(t.err0));
      try { data = JSON.parse(xhr.responseText); } catch(e) {
        return reject(new Error(t.errParse));
      }
      if (xhr.status === 401) return reject(new Error(t.err401));
      if (xhr.status === 429) return reject(new Error('__retry__'));
      if (xhr.status !== 200) return reject(new Error(t.errGen + 'HTTP ' + xhr.status));
      var txt = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      if (!txt) return reject(new Error(t.errGen + 'empty response'));
      resolve(txt);
    };
    xhr.send(JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: messages, max_tokens: 1500, temperature: 0.7, stream: false }));
  });
}

// Financial keywords that indicate footer A is needed

var FINANCIAL_KEYWORDS = /stocks?(?! up\b| room\b| take\b| pile\b| photo\b| footage\b| image\b| pot\b| car\b)|stock (market|price|exchange|split|buyback|option|dividend)|stockmarket|share(?!d )|bond(?! between| of love| of trust| of friendship| with (you|me|us|him|her|them))|bonds?\b(?! movie| film| james)|etf|crypto|bitcoin|forex|mortgage|loan|inflation|gdp|dividend|portfolio|invest|trading(?! insults| cards| places| post| card)|pension|s&p|nasdaq|dow jones|interest rate|compound interest|annual return|yield|equity|mutual fund|hedge fund|index fund|market cap|p\/e ratio|bull market|bear market|asset|commodity|futures|options contract|ריבית|מניה|מניות|אגרות חוב|קריפטו|משכנתא|הלוואה|אינפלציה|דיבידנד|תיק השקעות|פנסיה|תשואה|שוק ההון|בורסה|بيتكوين|كريبتو|فوركس|أسهم|سندات|عملات رقمية|فائدة|رهن|تضخم|محفظة|استثمار|تداول|acciones|bonos|criptomoneda|hipoteca|inflación|dividendo|cartera|bolsa|акции|облигации|криптовалюта|ипотека|инфляция|дивиденды|портфель|株式|債券|暗号通貨|金利|インフレ|配当|ポートフォリオ|שער|ביטקוין|מטבע|קרן|נדלן|נדל|בנק|ריבית|כלכלה|השקעה|השקעות|הלוואה|קריפטו|بيتكوين|ذهب|أسهم|سعر|استثمار|عملة|بنك|فائدة|比特币|股票|基金|投资|汇率|黄金|债券|利率|加密|ビットコイン|株式|投資|為替|金利|仮想通貨|ファンド|비트코인|주식|투자|환율|금리|암호화폐|bourse|action|obligation|investissement|crypto|taux|aktie|börse|anleihe|investition|kurs|zinsen|oro|petróleo|precio del|inversión|أستثمر|биткоин|крипт|זהב|כסף|עולה|العملات|رقمية|بنوك|بنك|borsa|inflação|azioni|obbligazioni|criptomoneta|rendimento|portafoglio|investimento|ação|acoes\b|ações\b|obrigação|criptom|investimento|ação|rendimento|криптовалюта|להשקיע|השקעה|השקעות|inflazione|kripto para|yatırım|enflasyon|hisse senedi|tahvil|yatırım fonu|kur farkı|faiz orani|фондовый|биткоин|крипт|акции|облигации|инвестиции|ипотека|título|ações|obrigações|mercado financeiro|taxa de juro|fundo de investimento|btc\b|btcoin|bitkoin|bitcoiin|stok market|stoks\b|stonk|inflatoin|inflacion|inflasao|intrest rate|mortgag|portfolo|diversif|divident|aktei|aktein|crpto|cryptoo|cryptp|krypto|aktienkauf|aktienmarkt|börse|borse|börsen|roi\b|reit\b|cpi\b|ipo\b|etf\b|aum\b|nav\b|eps\b|comprar acoes|acoes da bolsa|como comprar acoes/i;

function detectReplyLang(txt) {
  if (!txt) return 'English';
  if (/[\u05D0-\u05EA]/.test(txt)) return 'Hebrew';
  if (/[\u0600-\u06FF]/.test(txt)) return 'Arabic';
  if (/[\u0400-\u04FF]/.test(txt)) return 'Russian';
  if (/[\u4E00-\u9FFF]/.test(txt)) return 'Chinese';
  if (/[\u3040-\u30FF]/.test(txt)) return 'Japanese';
  if (/[\uAC00-\uD7AF]/.test(txt)) return 'Korean';
  if (/[\u0900-\u097F]/.test(txt)) return 'Hindi';
  if (/[\u0E00-\u0E7F]/.test(txt)) return 'Thai';
  if (/[\u0104-\u017E&&[^\u00C0-\u024F]]/.test(txt) || /[ąćęłńśźż]/i.test(txt)) return 'Polish';
  // Check special chars (most distinctive first)
  if (/[äöüß]/.test(txt)) return 'German';
  if (/[àâçéèêëîïôùûÿœæ]/.test(txt)) return 'French';
  if (/[áéíóúüñ¿¡]/.test(txt)) return 'Spanish';
  if (/[ãõ]/.test(txt)) return 'Portuguese';
  if (/[ğışçö]/.test(txt)) return 'Turkish';
  if (/[äöå]/.test(txt) && !/[äöü]/.test(txt)) return 'Swedish';
  // Keyword-based for Latin scripts
  var t = txt.toLowerCase();
  if (/\b(soy|estoy|puedo|ayudarte|cualquier|acciones|bonos|economia|finanzas|también|idioma|hola|gracias|como|porque|pero|nada|cuando|donde|bolsa|moneda|precio|mercado)\b/.test(t)) return 'Spanish';
  if (/\b(bonjour|je suis|vous|nous|pour|avec|dans|aussi|mais|sur|les|des|une|qui|que|par|ou|donc|suis|avez|pouvez|marché|bourse|argent|économie)\b/.test(t)) return 'French';
  if (/\b(ich bin|ich kann|sie|wir|und|oder|nicht|auch|aber|bitte|danke|hallo|guten|wie|was|warum|wann|wo|markt|wirtschaft|geld)\b/.test(t)) return 'German';
  if (/\b(sono|posso|qualsiasi|domanda|azioni|obbligazioni|economia|finanza|anche|grazie|ciao|come|perché|quando|dove|mercato|soldi)\b/.test(t)) return 'Italian';
  if (/\b(sou|posso|qualquer|pergunta|ações|economia|finanças|também|somos|olá|como|porque|quando|onde|mercado|dinheiro)\b/.test(t)) return 'Portuguese';
  return 'English';
}

// Known footer strings to strip (all languages, both A and B)
var ALL_FOOTERS_A = Object.values(FOOTER_A);
var ALL_FOOTERS_B = Object.values(FOOTER_B);

function enforceFooter(reply, userMsg) {
  // ── 1. Strip ALL existing footer lines (any language) ─────────────
  // NOTE: detect language AFTER stripping so Hebrew footer doesn't confuse detection
  var lines = reply.split('\n');
  var filtered = lines.filter(function(line) {
    var trimmed = line.trim();
    if (!trimmed) return true;
    // Strip if line is a known footer (exact or contained)
    var isFooterA = ALL_FOOTERS_A.some(function(f) {
      return trimmed === f || trimmed.indexOf(f) > -1 || f.indexOf(trimmed) > -1;
    });
    var isFooterB = ALL_FOOTERS_B.some(function(f) {
      return trimmed === f || trimmed.indexOf(f) > -1 || f.indexOf(trimmed) > -1;
    });
    // Also strip lines that look like financial disclaimer in any language
    var looksLikeFooter = /ייעוץ השקעות|investment advice|conseil en investissement|Anlageberatung|consulenza di investimento|aconselhamento de investimento|инвестиционн|yatırım tavsiyesi|consejo de inversion|asesoramiento de inversion|asesoramiento de inversión/i.test(trimmed)
      || /תמחותי|ma spécialité|meine spezialität|my expertise|mi especialidad|minha especialidade|моя специализация|uzmanlığım/i.test(trimmed);
    return !isFooterA && !isFooterB && !looksLikeFooter;
  });

  // Remove trailing blank lines
  while (filtered.length > 0 && filtered[filtered.length-1].trim() === '') {
    filtered.pop();
  }

  // Detect language AFTER stripping (so Hebrew footer doesn't pollute detection)
  var replyLang = detectReplyLang(filtered.join('\n'));

  // ── 2. Detect if greeting response → NO footer at all ─────────────
  // A greeting reply introduces Kiro and ends with "just ask" type phrase
  var replyBody = filtered.join(' ');
  var isGreeting = /\bKiro\b/i.test(replyBody) && (
    /solo pregunt|just ask|פשוט שאל|frag mich|chiedi pure|أسأل|demande|pergunte|спрашивай|pregúntame|soru sor|ask me|schreib mir|scrivi/i.test(replyBody) ||
    /cualquier idioma|any language|כל שפה|أي لغة|toute langue|jeder sprache|qualsiasi lingua|qualquer idioma/i.test(replyBody)
  );
  if (isGreeting) return filtered.join('\n');

  // ── 3. Determine A or B based on USER message topic ───────────────
  // Use ONLY user message for financial detection (not Kiro's reply which might mention finance)
  var isFinancial = FINANCIAL_KEYWORDS.test(userMsg || '');
  var footerMap = isFinancial ? FOOTER_A : FOOTER_B;
  var footerText = footerMap[replyLang] || (isFinancial ? FOOTER_A.English : FOOTER_B.English);

  return filtered.join('\n') + '\n\n' + footerText;
}

function addBubble(role, content) {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'mw' + (role === 'user' ? ' u' : '');
  // Detect text direction based on content
  const hasHebrew = /[\u0590-\u05FF]/.test(content);
  const hasArabic = /[\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF]/.test(content);
  const isRTL = hasHebrew || hasArabic;
  wrap.setAttribute('dir', isRTL ? 'rtl' : 'ltr');

  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const av = role === 'kiro'
    ? '<div class="av k">K</div>'
    : '<div class="av u"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/></svg></div>';

  const body = role === 'kiro'
    ? renderMD(content)
    : `<p>${escHTML(content).replace(/\n/g, '<br>')}</p>`;

  const copyBtn = role === 'kiro'
    ? `<button class="cp-btn" onclick="copyText(this, ${JSON.stringify(content)})">⎘</button>`
    : '';

  const dirAttr = isRTL ? 'dir="rtl"' : 'dir="ltr"';
  wrap.innerHTML = `
    <div class="mrow" ${dirAttr}>${av}<div class="bbl ${role === 'kiro' ? 'k' : 'u'}" ${dirAttr}>${body}${copyBtn}</div></div>
    <div class="mt">${time}</div>
  `;
  msgs.appendChild(wrap);
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = '⎘'; }, 1600);
  }).catch(() => {});
}

/* ══════════════════════════════════════
   MARKDOWN RENDERER
══════════════════════════════════════ */
function renderMD(raw) {
  let s = escHTML(raw);

  // Code blocks
  s = s.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Tables
  s = s.replace(/((?:\|[^\n]+\|\n?)+)/g, m => {
    const rows = m.trim().split('\n');
    let html = '<table>';
    rows.forEach((row, i) => {
      const cells = row.split('|').slice(1, -1);
      if (cells.every(c => /^[-:\s]+$/.test(c))) return; // separator row
      const tag = i === 0 ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    return html + '</table>';
  });

  // Headings
  s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  s = s.replace(/^### (.+)$/gm,  '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,   '<h3>$1</h3>');
  s = s.replace(/^# (.+)$/gm,    '<h3>$1</h3>');

  // Bold/italic
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g,     '<em>$1</em>');

  // Blockquote
  s = s.replace(/^&gt; ?(.+)$/gm, '<div class="bq">$1</div>');

  // Lists
  s = s.replace(/^[-•*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Wrap consecutive li
  s = s.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

  // Paragraphs
  s = s.replace(/\n\n+/g, '</p><p>');
  s = s.replace(/\n/g, '<br>');

  return `<p>${s}</p>`;
}

function escHTML(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
